[[headers]]
for = "/_next/static/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/images/*"
[headers.values]
  Cache-Control = "public, max-age=2592000, must-revalidate"

[[headers]]
for = "/audio/*"
[headers.values]
  Cache-Control = "public, max-age=2592000"

[build]
command = "pnpm build"